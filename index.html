<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quran — সূচিপত্র</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="index-app">
    <section class="index-shell">
      <header class="index-hero">
        <div class="index-hero-top">
          <div class="index-badge">Quran</div>
        </div>
        <h1 class="index-title">সূচিপত্র</h1>
        <p class="index-subtitle">সূরা ১–১১৪</p>
      </header>

      <section id="surahList" class="surah-list"></section>
    </section>
  </main>

  <script>
    async function loadMeta() {
      const res = await fetch("./meta.json");
      const meta = await res.json();

      const surahList = document.getElementById("surahList");

      surahList.innerHTML = meta.surahs.map((surah) => {
        return `
          <a class="surah-card" href="./reader.html?surah=${surah.surah_no}">
            <div class="surah-card-left">
              <div class="surah-number">${surah.surah_no}</div>
              <div class="surah-text">
                <div class="surah-bn-name">${surah.bn_name}</div>
                <div class="surah-en-name">${surah.en_name}</div>
              </div>
            </div>

            <div class="surah-card-right">
              <div class="surah-ar-name">${surah.ar_name}</div>
              <div class="surah-ayah-count">${surah.ayah_count} Ayah</div>
            </div>
          </a>
        `;
      }).join("");
    }

    loadMeta();
  </script>
</body>
</html>
